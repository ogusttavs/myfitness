$schema: aiox/spec-pipeline/implementation.v1
plannedBy: "@architect (Aria)"
plannedAt: "2026-04-26"
project: modo-caverna

epics:
  - id: EPIC-1
    name: Foundation
    goal: Projeto Expo rodando, theme aplicado, auth funcional, Supabase conectado.
    stories:
      - id: 1.1
        title: Bootstrap Expo + TypeScript + expo-router
        deps: []
      - id: 1.2
        title: Setup NativeWind v4 + tokens Modo Caverna + fonts (Inter, Bebas Neue)
        deps: [1.1]
      - id: 1.3
        title: Setup Supabase project + client + envs + types codegen
        deps: [1.1]
      - id: 1.4
        title: Auth flow (email + magic link) + deep linking
        deps: [1.3]
      - id: 1.5
        title: Tab navigation base (Hoje, Treino, Dieta, Progresso, Perfil) + design system primitives (Button, Card, Stepper, Heading)
        deps: [1.2, 1.4]
      - id: 1.6
        title: CI pipeline (lint, typecheck, jest, pgtap)
        deps: [1.3]

  - id: EPIC-2
    name: Profile + Coach Invite
    goal: Atleta cadastra perfil, gera convite para coach, pode revogar acesso.
    deps: [EPIC-1]
    stories:
      - id: 2.1
        title: DB migration + RLS — workspaces, profiles, athlete_data, weight_logs
        deps: [1.6]
      - id: 2.2
        title: Onboarding atleta + seed profile do PDF
        deps: [2.1]
      - id: 2.3
        title: Tela de perfil + edição + histórico de pesagens
        deps: [2.2]
      - id: 2.4
        title: Geração e redeem de invite code (coach)
        deps: [2.1]
      - id: 2.5
        title: Revoke coach access (AI-02 critique)
        deps: [2.4]

  - id: EPIC-3
    name: Diet
    goal: Plano alimentar editável + variações + log de aderência.
    deps: [EPIC-2]
    stories:
      - id: 3.1
        title: DB migration — meal_plans, meal_plan_meals, meal_plan_items, food_variations, meal_logs, foods_catalog
        deps: [2.1]
      - id: 3.2
        title: Seed do plano alimentar do PDF (1800 kcal, 6 refeições)
        deps: [3.1]
      - id: 3.3
        title: Tela de Dieta — render plano + macros do dia
        deps: [3.2]
      - id: 3.4
        title: Edição de itens (coach-only por RLS)
        deps: [3.3]
      - id: 3.5
        title: Cadastro de variações de alimento
        deps: [3.4]
      - id: 3.6
        title: Marcar refeição como consumida + escolher variação
        deps: [3.3]
      - id: 3.7
        title: Aderência diária no Hoje
        deps: [3.6]

  - id: EPIC-4
    name: Workout (plano + variações)
    goal: Plano de treino semanal editável + variações.
    deps: [EPIC-2]
    stories:
      - id: 4.1
        title: DB migration — workout_plans, plan_days, plan_exercises, exercise_variations, exercises_catalog
        deps: [2.1]
      - id: 4.2
        title: Seed do catálogo de exercícios + plano 5 dias do PDF
        deps: [4.1]
      - id: 4.3
        title: Tela de Treino — render 5 dias + drill-down em exercícios
        deps: [4.2]
      - id: 4.4
        title: Edição de exercícios/séries/reps/descanso/ordem (coach)
        deps: [4.3]
      - id: 4.5
        title: Cadastro de variações de exercício
        deps: [4.4]

  - id: EPIC-5
    name: Execution + Timer (CORE)
    goal: Registro rápido de séries + cronômetro de descanso confiável (background, drift, offline).
    deps: [EPIC-4]
    stories:
      - id: 5.1
        title: Timer engine (TS puro) + testes unitários (drift, pause/resume, +/-15s)
        deps: [1.5]
      - id: 5.2
        title: Hook useTimer + persistência MMKV
        deps: [5.1]
      - id: 5.3
        title: Scheduled notification (background) + permission + fallback haptic-only (AI-01)
        deps: [5.2]
      - id: 5.4
        title: Componente RestTimerRing (UI countdown grande Bebas Neue) + animação Reanimated
        deps: [5.2]
      - id: 5.5
        title: DB migration — workout_sessions, set_logs (com client_id idempotency)
        deps: [4.1]
      - id: 5.6
        title: Tela de execução — lista de exercícios + cards de séries + steppers
        deps: [4.3, 5.5]
      - id: 5.7
        title: Confirmar série → grava (otimista offline) + auto-start timer + scroll
        deps: [5.4, 5.6]
      - id: 5.8
        title: Histórico inline (última N execuções por exercício)
        deps: [5.7]
      - id: 5.9
        title: Plan snapshot ao iniciar sessão (CDD-06) + acceptance AI-03
        deps: [5.5]
      - id: 5.10
        title: Sugestão de progressão de carga (FR-09)
        deps: [5.8]
      - id: 5.11
        title: PR badge ember (FR-09)
        deps: [5.10]
      - id: 5.12
        title: Keep-awake durante sessão + cleanup ao sair
        deps: [5.6]

  - id: EPIC-6
    name: Progress (fotos + dashboard coach)
    deps: [EPIC-5]
    stories:
      - id: 6.1
        title: DB migration + Storage bucket — progress_photos + RLS storage
        deps: [2.1]
      - id: 6.2
        title: Upload de foto (picker + manipulator + supabase storage)
        deps: [6.1]
      - id: 6.3
        title: Galeria de fotos + filtro por ângulo
        deps: [6.2]
      - id: 6.4
        title: Comparativo before/after (2 datas)
        deps: [6.3]
      - id: 6.5
        title: Dashboard coach — aderência + treinos + volume + peso + últimas fotos
        deps: [3.7, 5.8, 6.3]

criticalPath:
  - 1.1 → 1.2 → 1.5 → 5.1 → 5.4 → 5.6 → 5.7
  - 1.3 → 1.4 → 2.1 → 4.1 → 5.5

releaseStrategy:
  alpha:
    epics: [EPIC-1, EPIC-2, EPIC-4, EPIC-5]
    rationale: "Treinar com timer é o valor primário. Diet e fotos podem entrar em beta."
  beta:
    epics: [EPIC-3]
  v1:
    epics: [EPIC-6]

acceptedActionItems:
  - AI-01: "EPIC-5/5.3 — fallback haptic-only se notification permission negada"
  - AI-02: "EPIC-2/2.5 — revoke coach access"
  - AI-03: "EPIC-5/5.9 — plan snapshot imutável quando coach edita durante sessão"

nextSteps:
  - "@ux-design-expert: front-end-spec.md (fluxos + wireframes + tokens)"
  - "@data-engineer: SCHEMA.md + migrations + pgtap RLS tests"
  - "@sm: criar stories em docs/stories/ a partir deste yaml"
